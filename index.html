<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명조 에코 마스터 도구함</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1d; color: #fff; text-align: center; padding: 50px 20px; }
        h1 { color: #ffeb3b; margin-bottom: 40px; }
        .menu-btn { 
            display: block; width: 100%; max-width: 300px; margin: 15px auto; 
            padding: 20px; border-radius: 12px; border: none; 
            font-size: 18px; font-weight: bold; cursor: pointer;
            text-decoration: none; color: #fff; transition: 0.3s;
        }
        .btn-1 { background: linear-gradient(45deg, #4caf50, #2e7d32); } /* 확률 */
        .btn-2 { background: linear-gradient(45deg, #ff9800, #ff5722); } /* 조정기 */
        .btn-3 { background: linear-gradient(45deg, #f44336, #d32f2f); } /* 손절 */
        .menu-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>🧩 에코 마스터 도구함</h1>
    
    <!-- 파일명은 본인이 저장한 이름과 똑같이 맞추세요 -->
    <a href="에코 확률 계산 범용.html" class="menu-btn btn-1">🌱 에코 확률 계산기</a>
    <a href="주파수 조정기 범용.html" class="menu-btn btn-2">🔧 에코 주파수 조정기 계산기</a>
    <a href="에코 효율 강화 범용.html" class="menu-btn btn-3">🛑 에코 손절 족보</a>

    <p style="color: #888; margin-top: 50px; font-size: 12px;">크롬 메뉴에서 [홈 화면에 추가]를 눌러 앱처럼 사용하세요!</p>
</body>
</html>
